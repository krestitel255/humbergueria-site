    <h1>Resumo do Pedido</h1>
    <div class="recibo">
        <h2>Itens Selecionados:</h2>
        <ul id="detalhes"></ul>
        <p class="total">Obrigado por escolher nossa Hamburgueria!</p>
    </div>


    <script>
        function getParametro(nome) {
            let urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(nome);
        }

        let lanche = getParametro("lanche");
        let opcao = getParametro("opcao");
        let porcoes = getParametro("porcoes");
        let sobremesas = getParametro("sobremesas");
        let promocoes = getParametro("promocoes");

        let lista = document.getElementById("detalhes");

        if (lanche && opcao) {
            let li = document.createElement("li");
            li.textContent = "Lanche: " + lanche + " (" + opcao + ")";
            lista.appendChild(li);
        }
        if (porcoes) {
            let li = document.createElement("li");
            li.textContent = "Porções: " + porcoes;
            lista.appendChild(li);
        }
        if (sobremesas) {
            let li = document.createElement("li");

            let nomes = sobremesas.replace("sorvete_chocolate", "Sorvete de Chocolate")
                .replace("sorvete_morango", "Sorvete de Morango");
            li.textContent = "Sobremesas: " + nomes;
            lista.appendChild(li);
        }
        if (promocoes) {
            let li = document.createElement("li");
            li.textContent = "Promoções: " + promocoes;
            lista.appendChild(li);
        }

        if (lista.children.length === 0) {
            let li = document.createElement("li");
            li.textContent = "Nenhum pedido selecionado.";
            lista.appendChild(li);
        }
    </script>
