    <h1>Porções</h1>
    <div class="galeria">
        <div class="lanche">
            <h2>Batata Frita(150g)</h2>
            <img src="imagem/porção1.jpeg" alt="Batata Frita">
            <p class="preco">R$ 12,00</p>
            <label><input type="checkbox" value="batata"> Selecionar</label>
        </div>

        <div class="lanche">
            <h2>Batata Frita com Queijo(250g)</h2>
            <img src="imagem/batata2.jpeg" alt="Batata Frita com Queijo">
            <p class="preco">R$ 16,00</p>
            <label><input type="checkbox" value="batataqueijo"> Selecionar</label>
        </div>
    </div>


    <footer>
        <button class="finalizar" onclick="finalizarPorcao()">Finalizar Pedido</button>
    </footer>

    <script>
        function finalizarPorcao() {
            let selecionados = [];
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(item => {
                selecionados.push(item.value);
            });

            window.location.href = "pedidos.html?porcoes=" + encodeURIComponent(selecionados.join(", "));
        }
    </script>
