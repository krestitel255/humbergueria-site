    <h1>Sobremesas</h1>
    <div class="galeria">
        <div class="lanche">
            <h2>Pudim</h2>
            <img src="imagem/pudin.jpeg" alt="Pudim">
            <p class="preco">R$ 8,00</p>
            <label><input type="checkbox" value="pudim"> Selecionar</label>
        </div>

        <div class="lanche">
            <h2>Mousse de Chocolate</h2>
            <img src="imagem/mousse.jpeg" alt="Mousse de Chocolate">
            <p class="preco">R$ 9,00</p>
            <label><input type="checkbox" value="mousse"> Selecionar</label>
        </div>

        <div class="lanche">
            <h2>Sorvete</h2>
            <img src="imagem/sorvete de cone.jpeg" alt="Sorvete">
            <p class="preco">R$ 7,00</p>
            <label><input type="checkbox" value="sorvete_chocolate"> Chocolate</label>
            <label><input type="checkbox" value="sorvete_morango"> Morango</label>
        </div>


        <footer>

            <button class="finalizar" onclick="finalizarSobremesa()">Finalizar Pedido</button>
        </footer>

        <script>
            function finalizarSobremesa() {
                let selecionados = [];
                document.querySelectorAll('input[type="checkbox"]:checked').forEach(item => {
                    selecionados.push(item.value);
                });

                window.location.href = "pedidos.html?sobremesas=" + encodeURIComponent(selecionados.join(", "));
            }
        </script>
